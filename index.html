<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="style.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body>
    <header class="w-100">
      <div class="top_bar h-100 flex ai-c jc-sb">
        <div class="top_bar_logo">
          <a href="#" class="block"></a>
        </div>
        <nav class="top_bar_menu flex">
          <ul class="flex">
            <li><a href="#">모든 콘텐츠</a></li>
            <li><a href="#">큐레이션</a></li>
            <li><a href="#">필진</a></li>
          </ul>
          <button class="search_btn"></button>
        </nav>
      </div>

      <div class="search_box">
        <div class="search_inner">
          <div class="search_input flex">
            <button class="search_btn-2 flex ai-c jc-c">
              <i class="search_icon"></i>
            </button>
            <input
              class="input_search"
              type="search"
              placeholder="키워드로 검색해보세요!"
            />
          </div>

          <div class="keyword_box block">
            <em class="keyword_title">Popular Keyword</em>
            <div class="keyword_list_box flex">
              <div class="item_label">
                <a href="#"
                  ><button type="button" class="btn_label">브랜딩</button></a
                >
              </div>
              <div class="item_label">
                <a href="#"
                  ><button type="button" class="btn_label">마케팅</button></a
                >
              </div>
              <div class="item_label">
                <a href="#"
                  ><button type="button" class="btn_label">테크</button></a
                >
              </div>
              <div class="item_label">
                <a href="#"
                  ><button type="button" class="btn_label">서비스</button></a
                >
              </div>
              <div class="item_label">
                <a href="#"
                  ><button type="button" class="btn_label">디자인</button></a
                >
              </div>
              <div class="item_label">
                <a href="#"
                  ><button type="button" class="btn_label">기획</button></a
                >
              </div>
              <div class="item_label">
                <a href="#"
                  ><button type="button" class="btn_label">
                    네이버생활
                  </button></a
                >
              </div>
              <div class="item_label">
                <a href="#"
                  ><button type="button" class="btn_label">기업문화</button></a
                >
              </div>
              <div class="item_label">
                <a href="#"
                  ><button type="button" class="btn_label">커리어</button></a
                >
              </div>
              <div class="item_label">
                <a href="#"
                  ><button type="button" class="btn_label">인사이트</button></a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="slider">
      <div class="slider-view">
        <div class="slider-track">
          <div class="slide active">
            <div class="slide-content">
              <h2>첫 번째 슬라이드</h2>
              <p>안의 요소만 움직이게</p>
            </div>
          </div>

          <div class="slide">
            <div class="slide-content">
              <h2>두 번째 슬라이드</h2>
              <p>배경은 그대로 유지</p>
            </div>
          </div>

          <div class="slide">
            <div class="slide-content">
              <h2>세 번째 슬라이드</h2>
              <p>내용만 오른쪽에서 등장</p>
            </div>
          </div>
        </div>
      </div>

      <button class="prev slider-btn" aria-label="이전">
        <span class="arrow"></span>
      </button>

      <button class="next slider-btn" aria-label="다음">
        <span class="arrow"></span>
      </button>

      <div class="slider-progress">
        <button class="progress-item" aria-label="1번 슬라이드">
          <span class="progress-fill"></span>
        </button>
        <button class="progress-item" aria-label="2번 슬라이드">
          <span class="progress-fill"></span>
        </button>
        <button class="progress-item" aria-label="3번 슬라이드">
          <span class="progress-fill"></span>
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
