<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- JS -->
    <script src="script.js"></script>
  </head>
  <body>
    <header class="w-100">
      <div class="top_bar h-100 flex ai-c jc-sb">
        <div class="top_bar_logo">
          <a href="#" class="block"></a>
        </div>
        <nav class="top_bar_menu flex">
          <ul class="flex">
            <li><a href="#">모든 콘텐츠</a></li>
            <li><a href="#">큐레이션</a></li>
            <li><a href="#">필진</a></li>
          </ul>
          <button class="search_btn"></button>
        </nav>
      </div>
      <div class="search_box">
        <div class="search_inner">
          <div class="search_input flex">
            <button class="search_btn-2 flex ai-c jc-c">
              <i class="search_icon"></i>
            </button>
            <input
              class="input_search"
              type="search"
              placeholder="키워드로 검색해보세요!"
            />
          </div>
          <div class="keyword_box block">
            <em class="keyword_title">Popular Keyword</em>
            <div class="keyword_list_box flex">
              <div class="item_label">
                <a href="#">
                  <button type="button" class="btn_label">브랜딩</button>
                </a>
              </div>
              <div class="item_label">
                <a href="#">
                  <button type="button" class="btn_label">마케팅</button>
                </a>
              </div>
              <div class="item_label">
                <a href="#">
                  <button type="button" class="btn_label">테크</button>
                </a>
              </div>
              <div class="item_label">
                <a href="#">
                  <button type="button" class="btn_label">서비스</button>
                </a>
              </div>
              <div class="item_label">
                <a href="#">
                  <button type="button" class="btn_label">디자인</button>
                </a>
              </div>
              <div class="item_label">
                <a href="#">
                  <button type="button" class="btn_label">기획</button>
                </a>
              </div>
              <div class="item_label">
                <a href="#">
                  <button type="button" class="btn_label">네이버생활</button>
                </a>
              </div>
              <div class="item_label">
                <a href="#">
                  <button type="button" class="btn_label">기업문화</button>
                </a>
              </div>
              <div class="item_label">
                <a href="#">
                  <button type="button" class="btn_label">커리어</button>
                </a>
              </div>
              <div class="item_label">
                <a href="#">
                  <button type="button" class="btn_label">인사이트</button>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
